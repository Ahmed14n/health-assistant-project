<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>

</head>
<body>
    <div class="container">
        <h2>Body Mass Index (BMI)</h2>

</fieldset>

<h3 id="res" class="result-text"></h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
